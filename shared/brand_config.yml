# ========================================================================
# VIDEO GENERATION (configurable por provider)
# ========================================================================

video_generation:
  provider: "d-id"  # overridden by provider_selections.video when set

  # D-ID (AI Avatars) - Bueno para talking head videos
  d-id:
    api_key_env: "D_ID_API_KEY"
    presenter_id: "amy-Aq6OmGZnMt"  # Default avatar
    voice_id: "en-US-JennyNeural"
    cost_per_minute: 0.30
    notes: "Good baseline for simple talking-head videos, fast and cheaper than premium avatar tools"

  # Google Veo (Vertex AI) - Mejor calidad generativa/cinematográfica
  veo:
    project_env: "GOOGLE_CLOUD_PROJECT"
    location: "us-central1"
    model: "veo-3.1-generate-preview"
    resolution: "720p"
    generate_audio: true
    enhance_prompt: true
    person_generation: "allow_adult"
    sample_count: 1
    storage_uri: null  # Opcional: gs://bucket/prefix/
    cost_per_minute: 1.80
    notes: "Best option in this repo for a non-human mascot with reference images and varied trading-related scenes"

  # HeyGen (Popular para avatares realistas) - Mejor fit para personaje hablando
  heygen:
    api_key_env: "HEYGEN_API_KEY"
    character_type: "avatar"  # avatar | talking_photo
    avatar_id: "your_heygen_avatar_id_here"
    # talking_photo_id: "your_talking_photo_id_here"
    avatar_style: "normal"
    voice_id: "your_heygen_voice_id_here"
    speed: 1.0
    pitch: 0
    caption: false
    background_type: "color"  # color | image
    background_value: "#101010"
    test: false
    title: "Jess Trading AI Video"
    cost_per_minute: 0.40
    notes: "Best fit for a consistent created avatar or digital twin speaking directly to camera"

  # OpenAI Sora 2 / 2 Pro - Video generativo premium con audio sincronizado
  openai-sora:
    api_key_env: "OPENAI_API_KEY"
    model: "sora-2"
    size: "720x1280"
    fps: 24
    cost_per_second: 0.10
    notes: "Premium synced-audio generative video via OpenAI"

  # Synthesia (Enterprise-grade)
  synthesia:
    api_key_env: "SYNTHESIA_API_KEY"
    avatar_id: "anna"
    voice_id: "en-US-female-1"
    cost_per_minute: 0.50
    notes: "Premium quality, best for professional content"

  # Runway Gen-3 (Alta calidad cinematográfica)
  runway:
    api_key_env: "RUNWAY_API_KEY"
    model: "gen3"
    cost_per_minute: 1.20
    notes: "Best visual quality, expensive, slower"

  # Pika Labs (Estilo creativo)
  pika:
    api_key_env: "PIKA_API_KEY"
    model: "pika-1.5"
    cost_per_minute: 0.60
    notes: "Creative style, good for dynamic content"

# ========================================================================
# IMAGE GENERATION (configurable por provider)
# ========================================================================

image_generation:
  provider: "flux"  # overridden by provider_selections.image when set

  # Flux (Replicate) - Gratis y rápido
  flux:
    api_key_env: "REPLICATE_API_TOKEN"
    model: "black-forest-labs/flux-schnell"  # schnell | dev | pro
    cost_per_image: 0.00  # Schnell es gratis
    speed: "fast"  # 2-5 segundos
    notes: "Best for high volume, free tier available"

  # DALL-E 3 (OpenAI) - Muy buena calidad
  dalle:
    api_key_env: "OPENAI_API_KEY"
    model: "dall-e-3"
    size: "1024x1024"
    quality: "hd"  # standard | hd
    cost_per_image: 0.08  # HD pricing
    notes: "Excellent quality, good text rendering"

  # GPT Image (OpenAI) - Mejor imagen del stack OpenAI actual
  openai-image:
    api_key_env: "OPENAI_API_KEY"
    model: "gpt-image-1.5"
    size: "1024x1024"
    quality: "high"  # low | medium | high
    cost_per_image: 0.133
    notes: "Latest premium OpenAI image profile"

  # Midjourney v7 (A través de API no oficial)
  midjourney:
    api_key_env: "MIDJOURNEY_API_KEY"
    version: "7"
    cost_per_image: 0.10
    notes: "Premium aesthetic, requires unofficial API"

  # Stable Diffusion XL (Open source)
  sdxl:
    api_key_env: "REPLICATE_API_TOKEN"
    model: "stabilityai/sdxl"
    cost_per_image: 0.02
    notes: "Open source, good customization"

  # Ideogram (Mejor para texto en imágenes)
  ideogram:
    api_key_env: "IDEOGRAM_API_KEY"
    model: "ideogram-v2"
    cost_per_image: 0.06
    notes: "Best for text in images, great for infographics"

# ========================================================================
# CONTENT SCHEDULE (configurar frecuencia de generación)
# ========================================================================

content_schedule:
  # Cuántos videos generar por día
  videos_per_day: 1  # Cambia a 10 para alta frecuencia

  # Intervalo entre generaciones (auto-calculado si no se especifica)
  # 24 horas / videos_per_day = intervalo en horas
  generation_interval_hours: null  # null = auto-calculate

  # O especifica horarios exactos (sobrescribe videos_per_day)
  generation_times: []
  # Ejemplo para 10 videos/día:
  # generation_times:
  #   - "08:00"
  #   - "10:30"
  #   - "13:00"
  #   - "15:30"
  #   - "18:00"
  #   - "20:30"
  #   - "23:00"
  #   - "01:30"
  #   - "04:00"
  #   - "06:30"

  # Días activos de la semana (0=Monday, 6=Sunday)
  active_days: [0, 1, 2, 3, 4, 5, 6]  # Todos los días
  # Ejemplo para solo lunes a viernes:
  # active_days: [0, 1, 2, 3, 4]

  # Pausar generación automática
  auto_generation_enabled: true

  # Hora de inicio/fin (24h format)
  generation_window:
    start: "08:00"
    end: "23:00"

# ========================================================================
# PUBLISHING (autopublish después de aprobación HITL)
# ========================================================================

publishing:
  auto_publish_on_approval: true
  retry_attempts: 2
  retry_delay_seconds: 30
  min_interval_seconds: 0

  # Requerido para Instagram si el archivo vive solo en disco local:
  # el usuario futuro debe exponer el repo o la carpeta de media bajo esta base URL.
  # Ejemplo:
  # public_media_base_url: "https://media.example.com/"
  public_media_base_url: null

  instagram:
    api_version: "v22.0"

  tiktok:
    privacy_level: "SELF_ONLY"
    disable_duet: false
    disable_comment: false
    disable_stitch: false
    cover_timestamp_ms: 1000
    chunk_size_bytes: 5000000

  youtube_shorts:
    privacy_status: "private"
    category_id: "27"
    self_declared_made_for_kids: false
    token_file: "shared/memory/youtube_token.json"

  facebook:
    api_version: "v22.0"

