# ========================================================================
# OpenClaw Configuration — Jess Trading Autonomous Agency
# ========================================================================
#
# This file configures the OpenClaw framework for running the 4-agent
# autonomous agency system for Jess Trading.
#
# ========================================================================

project:
  name: "jess-trading-agency"
  version: "1.0.0"
  description: "Autonomous workforce for Jess Trading - 90% operational automation"

# ========================================================================
# LLM Configuration (Primary AI Engine)
# ========================================================================
llm:
  provider: "google-gemini"  # Options: google-gemini, openai, anthropic, ollama
  model: "gemini-2.0-flash"  # Free tier: ~20 requests/day
  temperature: 0.7
  max_tokens: 8192

  # API configuration
  api_key_env: "GEMINI_API_KEY"  # Read from .env file

  # Fallback model (if primary fails or quota exceeded)
  fallback:
    enabled: true
    provider: "ollama"  # Local model as backup
    model: "llama3.3:latest"

# ========================================================================
# Agent Configuration
# ========================================================================
agents:
  # The Marketer (Content Lead)
  - name: "marketer"
    enabled: true
    identity_file: "agents/marketer/IDENTITY.md"
    heartbeat_interval: 1800  # 30 minutes in seconds
    skills:
      - "telegram_hitl"
      - "content_parser"
      - "visual_validator"
      - "tavily_search"
      - "image_generation"
      - "social_media_publisher"

  # The Innovator (Product Lead)
  - name: "innovator"
    enabled: false  # Enable after Marketer works
    identity_file: "agents/innovator/IDENTITY.md"
    heartbeat_interval: 1800
    skills:
      - "ea_pipeline_runner"
      - "strategy_packager"
      - "performance_analyzer"
      - "telegram_notifier"

  # The Support Agent (Community Manager)
  - name: "support"
    enabled: false  # Enable after Marketer works
    identity_file: "agents/support/IDENTITY.md"
    heartbeat_interval: 900  # 15 minutes (faster response)
    skills:
      - "knowledge_base_search"
      - "sentiment_analyzer"
      - "conversation_logger"
      - "telegram_escalation"
      - "social_media_listener"

  # The Operator (Finance Lead)
  - name: "operator"
    enabled: false  # Enable after Marketer works
    identity_file: "agents/operator/IDENTITY.md"
    heartbeat_interval: 1800
    skills:
      - "whop_api_reader"
      - "stripe_api_reader"
      - "refund_escalator"
      - "financial_reporter"
      - "affiliate_tracker"

# ========================================================================
# Communication & HITL (Human in the Loop)
# ========================================================================
communication:
  # Primary communication channel
  gateway: "telegram"

  telegram:
    bot_token_env: "TELEGRAM_BOT_TOKEN"
    owner_chat_id_env: "TELEGRAM_OWNER_CHAT_ID"

    # HITL approval settings
    hitl_enabled: true
    approval_timeout: 172800  # 48 hours in seconds
    reminder_interval: 86400  # 24 hours

    # Notification settings
    send_heartbeat_alerts: true
    send_error_alerts: true
    send_completion_alerts: true

# ========================================================================
# Skills Configuration (Custom Tools)
# ========================================================================
skills:
  directory: "skills"
  auto_discover: true

  # Skill-specific settings
  telegram_hitl:
    approval_queue_path: "shared/approval_queue.yml"

  image_generation:
    provider: "replicate"
    model: "black-forest-labs/flux-schnell"
    default_size: "1080x1080"

  tavily_search:
    api_key_env: "TAVILY_API_KEY"
    max_results: 5

  social_media_publisher:
    platforms:
      - instagram
      - twitter
      - linkedin
    rate_limit: 10  # posts per hour max

# ========================================================================
# Memory & State Management
# ========================================================================
memory:
  type: "file"  # Options: file, redis, postgresql
  directory: "shared/memory"

  # Persistence settings
  save_interval: 300  # Save state every 5 minutes
  max_conversation_history: 50

  # Shared state files
  product_inventory: "shared/product_inventory.yml"
  approval_queue: "shared/approval_queue.yml"
  escalation_queue: "shared/escalation_queue.yml"
  financial_dashboard: "shared/financial_dashboard.yml"

# ========================================================================
# Security & Constraints
# ========================================================================
security:
  # File system boundaries
  allowed_directories:
    - "agents/"
    - "skills/"
    - "config/"
    - "EA_developer/"
    - "shared/"

  forbidden_directories:
    - "/"
    - "/etc/"
    - "/sys/"
    - "/var/"

  # API security
  require_env_vars: true
  never_log_secrets: true
  api_key_rotation_reminder: 90  # days

  # Agent isolation
  sandbox_mode: true
  max_file_size: 10485760  # 10MB
  max_execution_time: 300  # 5 minutes per skill

# ========================================================================
# Logging & Monitoring
# ========================================================================
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  directory: "shared/logs"

  # Log rotation
  rotation: "daily"
  retention_days: 30

  # Structured logging
  format: "json"
  include_timestamps: true
  include_agent_name: true

# ========================================================================
# Error Handling
# ========================================================================
error_handling:
  # Retry configuration
  max_retries: 3
  retry_delay: 5  # seconds
  exponential_backoff: true

  # Escalation on persistent errors
  escalate_after_failures: 3
  notify_owner_on_critical: true

  # Fallback behavior
  graceful_degradation: true
  continue_on_skill_failure: false

# ========================================================================
# Development vs Production
# ========================================================================
environment: "production"  # Options: development, staging, production

# Development overrides (when environment: development)
development:
  heartbeat_interval: 300  # 5 minutes for faster testing
  log_level: "DEBUG"
  mock_apis: false
  skip_hitl_approval: false  # NEVER skip in production

# ========================================================================
# Deployment & Health Checks
# ========================================================================
health_checks:
  enabled: true
  check_interval: 60  # seconds

  checks:
    - name: "llm_api"
      type: "api_connectivity"
      critical: true

    - name: "telegram_bot"
      type: "api_connectivity"
      critical: true

    - name: "disk_space"
      type: "system_resource"
      threshold: 5000  # MB free required
      critical: true

    - name: "memory_usage"
      type: "system_resource"
      threshold: 80  # percent
      critical: false

# ========================================================================
# Metadata (for tracking and analytics)
# ========================================================================
metadata:
  owner: "Jess Trading"
  owner_email: "support@jesstrading.com"
  deployment_date: "2026-03-23"
  timezone: "America/New_York"  # EST/EDT

  # Analytics (future feature)
  analytics_enabled: false
  telemetry_enabled: false

# ========================================================================
# END OF CONFIGURATION
# ========================================================================
